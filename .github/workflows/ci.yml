  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up godot testing
        # testing with mike schulze from marketplace
        uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: '4.2.1'
          # include path to tests, need to access in root directory
          paths: 'res://tests'
          version: 'latest'
